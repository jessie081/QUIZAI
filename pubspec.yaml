name: quizpdf_ai
description: QuizPDF AI mobile MVP built with Flutter and Riverpod.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.1.5
  file_picker: ^8.0.7
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  syncfusion_flutter_pdf: ^28.2.12
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#F4F7FF"
  adaptive_icon_foreground: assets/icon.png
